# LLM 接口配置
# 支持本地 ollama 和远程 API 两种模式

# 默认使用的 provider
default_provider: "ollama"

# 本地 ollama 配置
ollama:
  base_url: "http://localhost:11434"
  models:
    local_default:
      name: "qwen3.5:4b"
      temperature: 0.4
      top_p: 0.95
      max_tokens: 7000
      # 本地8GB显存配置
      context_window: 32000
    cloud_default:
      # name: "deepseek-r1:32b-16k"
      name: "qwen2.5:14b-16k"
      temperature: 0.9
      top_p: 0.7
      max_tokens: 35000
      # 云服务器双卡16GB配置
      context_window: 16384

# 远程 API 配置（OpenAI兼容）
openai:
  base_url: "https://api.openai.com/v1"
  api_key: "${OPENAI_API_KEY}"
  models:
    default:
      name: "gpt-4o-mini"
      temperature: 0.4
      top_p: 0.95
      max_tokens: 7000

# Prompt 模式配置
prompt_modes:
  evidence_extraction:
    system_prompt: |
      You are an expert academic paper analyst. Your task is to extract structured evidence from the given research paper.
      Extract the following types of evidence:
      1. Claim evidence: Core claims and contributions from abstract, introduction, and conclusion.
      2. Method evidence: Methodology descriptions from the methods section.
      3. Experiment evidence: Experimental setup and results.
      4. Reference evidence: Key citations and related work.
      5. Consistency evidence: Any inconsistencies across sections.

      Output each evidence with: evidence_id, source_type, section, evidence_text, related_dimension, confidence.
    max_tokens: 4000

  scoring:
    system_prompt_template: |
      You are an expert academic reviewer evaluating papers for a NeurIPS/ICML-level conference.
      {mode_instruction}

      DATASET CALIBRATION (human reviewer statistics):
      - Rating (1-10): typical papers score 5.5, most fall in 4-7 range
        9.0+: Exceptional landmark work | 7.5: Strong | 6.0: Above average | 5.0: Average | 3.5: Below average | 2.0: Poor
      - Soundness/Presentation/Contribution (1-4): typical papers score 2.5-3.0
        4.0: Outstanding | 3.25: Good | 2.75: Average | 2.0: Weak | 1.25: Poor

      SCORING RULES:
      1. Judge absolute quality directly. Do NOT start from maximum and deduct.
      2. Most papers cluster near the dataset mean. Only exceptional work deserves top scores.
      3. Be specific about weaknesses, but the final score reflects overall quality, not flaw count.
      4. Use the full scale. A middle-range score means "average for this conference", not "acceptable".

      For each paper, address:
      1. Summary: Briefly outline main points.
      2. Soundness: Assess methodology and logical consistency.
      3. Presentation: Evaluate clarity, organization, and visual aids.
      4. Contribution: Analyze significance and novelty.
      5. Weaknesses: Point out specific flaws (be concrete).
      6. Strengths: Identify strongest aspects (be sparing).
      7. Suggestions: Provide actionable suggestions.
      8. Questions: Pose questions for the authors.
      9. Rating: Overall score 1-10 with 0.05 precision.
      10. Confidence: Your confidence level (1-5).
      11. Decision: Accept ONLY if Rating >= 6.5.

      {reviewer_instruction}

      You must fill out the review in the following format:
      \boxed_review{{
      ## Summary:
      ...
      ## Soundness:
      ...
      ## Presentation:
      ...
      ## Contribution:
      ...
      ## Strengths:
      ...
      ## Weaknesses:
      ...
      ## Suggestions:
      ...
      ## Questions:
      ...
      ## Rating:
      ...
      ## Confidence:
      ...
      ## Decision:
      ...
      }}
    max_tokens: 7000

  arbitration:
    system_prompt: |
      You are an expert arbitration agent. Your task is to aggregate multiple reviewer scores and resolve disagreements.
      Given multiple reviews with scores and justifications, produce a final consensus score for each dimension.
      If reviewers disagree significantly, explain why and provide your best judgment.
      Output the final scores in JSON format with dimension names as keys.
    max_tokens: 3000

  explanation:
    system_prompt: |
      You are an expert explanation generator. Your task is to produce a structured, evidence-driven explanation for the given scores.
      You must cite real evidence from the paper and reference specific rubric dimensions.
      Do not fabricate evidence. Only use the evidence provided to you.
      Output the explanation using the provided template.
    max_tokens: 3000

# 模式特定指令
mode_instructions:
  fast: "Your thinking mode is Fast Mode. In this mode, you should quickly provide the review results."
  standard: |
    Your thinking mode is Standard Mode. In this mode, you should review by simulating {reviewer_num} different reviewers,
    and use self-verification to double-check any paper deficiencies identified. Finally, provide complete review results.

    When you simulate different reviewers, write the sections in this order: Summary, Soundness, Presentation, Contribution, Strengths, Weaknesses, Suggestions, Questions, Rating and Confidence.

    After all reviewer simulations, wrap them in:
    \boxed_simreviewers{{
    ## Reviewer 1
    ...
    ## Reviewer 2
    ...
    }}
  best: |
    Your thinking mode is Best Mode. In this mode, you should aim to provide the most reliable review results by conducting a thorough analysis of the paper.
    I allow you to use search tools to obtain background knowledge about the paper - please provide three different questions.
    I will help you with the search. After you complete your thinking, you should review by simulating {reviewer_num} different reviewers,
    and use self-verification to double-check any paper deficiencies identified. Finally, provide complete review results.

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "experiments/logs/deepreview.log"
